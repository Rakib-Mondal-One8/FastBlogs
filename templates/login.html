<!-- @format -->

{% extends 'base.html' %} {% block content %}

<div class="bg-slate-950 min-h-screen flex items-center justify-center px-4">
  <div
    class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
    <!-- Heading -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white mb-2">Welcome Back</h1>
      <p class="text-slate-400">Login to continue to your account</p>
    </div>

    <!-- Form -->
    <form id="loginForm" class="space-y-5">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
          Username
        </label>
        <input
          name="username"
          type="text"
          placeholder="Enter your username"
          class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-white rounded-xl px-4 py-3 transition" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
          Password
        </label>
        <input
          name="password"
          type="password"
          placeholder="Enter your password"
          class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-white rounded-xl px-4 py-3 transition" />
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-slate-400">
          <input
            type="checkbox"
            class="rounded bg-slate-800 border-slate-700" />
          Remember me
        </label>

        <a href="#" class="text-blue-400 hover:text-blue-300 transition">
          Forgot password?
        </a>
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-blue-500 hover:bg-blue-600 transition py-3 rounded-xl text-white font-semibold shadow-lg shadow-blue-500/20">
        Login
      </button>
    </form>

    <!-- Register -->
    <p class="text-center text-slate-400 mt-8">
      Don’t have an account?
      <a
        href="/auth/register"
        class="text-blue-400 hover:text-blue-300 transition font-medium">
        Register
      </a>
    </p>
  </div>
</div>
<script
  type="module"
  src="{{url_for('static',path='js/auth/login.js')}}"></script>
{% endblock %}
