<!-- @format -->

{% extends 'base.html' %} {% block content %}
<div
  class="bg-slate-950 min-h-screen flex items-center justify-center px-4 py-10">
  <div
    class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
    <!-- Heading -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white mb-2">Create Account</h1>
      <p class="text-slate-400">
        Join the platform and start sharing your blogs
      </p>
    </div>

    <!-- Form -->
    <form id="registerForm"  class="space-y-5">
      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
          Username
        </label>

        <input
          name="username"
          type="text"
          placeholder="Enter your username"
          class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-white rounded-xl px-4 py-3 transition" />
      </div>
      <!-- First Name -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
          First Name
        </label>

        <input
          name="first_name"
          type="text"
          placeholder="Enter your username"
          class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-white rounded-xl px-4 py-3 transition" />
      </div>
      <!-- Last Name -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
          Last Name
        </label>

        <input
          name="last_name"
          type="text"
          placeholder="Enter your username"
          class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-white rounded-xl px-4 py-3 transition" />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
          Email
        </label>

        <input
          name="email"
          type="email"
          placeholder="Enter your email"
          class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-white rounded-xl px-4 py-3 transition" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
          Password
        </label>

        <input
          name="password"
          type="password"
          placeholder="Create a password"
          class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-white rounded-xl px-4 py-3 transition" />
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">
          Confirm Password
        </label>

        <input
          name="password2"
          type="password"
          placeholder="Confirm your password"
          class="w-full bg-slate-800 border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-white rounded-xl px-4 py-3 transition" />
      </div>

      <!-- Terms -->
      <label class="flex items-start gap-3 text-sm text-slate-400">
        <input
            name="checkbox"
          type="checkbox"
          class="mt-1 rounded bg-slate-800 border-slate-700" />

        <span>
          I agree to the
          <a href="#" class="text-blue-400 hover:text-blue-300 transition">
            Terms & Conditions
          </a>
        </span>
      </label>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-blue-500 hover:bg-blue-600 transition py-3 rounded-xl text-white font-semibold shadow-lg shadow-blue-500/20">
        Create Account
      </button>
    </form>

    <!-- Login -->
    <p class="text-center text-slate-400 mt-8">
      Already have an account?
      <a
        href="/auth/login"
        class="text-blue-400 hover:text-blue-300 transition font-medium">
        Login
      </a>
    </p>
  </div>
</div>

<script type="module" src="{{url_for('static',path='js/auth/register.js')}}"></script>
{% endblock %}
